<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Speech GUI</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>Offline Speech Translation</h1>

      <section class="controls">
        <label for="source-language">Source language</label>
        <select id="source-language">
          <option value="auto" selected>Auto detect</option>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
        </select>

        <label for="target-language">Translation language</label>
        <select id="target-language">
          <option value="" selected>No translation</option>
          <option value="other">Other language (en/hi)</option>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
        </select>

        <button id="mic-toggle" class="mic-btn">Start Mic</button>
      </section>

      <section class="setup-panel">
        <button id="setup-argos-btn" class="setup-btn">Setup Translation Models</button>
      </section>

      <section class="output-panel">
        <div class="output-header">
          <span>Output</span>
          <span id="status-indicator" class="status idle">Idle</span>
        </div>
        <div id="output-window" class="output-window"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
